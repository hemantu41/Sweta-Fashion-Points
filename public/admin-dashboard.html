function DeliveryZone({pinInfo,l}){
  const [km,setKm]=useState(30);
  const count=Math.max(1,Math.ceil((km/100)*ALL_PINS.length));
  return (
    <Card>
      <div style={{fontSize:14,fontWeight:700,color:C.gray800,marginBottom:12}}>{T[l].delivZone}</div>
      <div style={{fontSize:13,color:C.gray600,marginBottom:6}}>{T[l].radius}: <b style={{color:C.teal}}>{km} km</b></div>
      <input type="range" min={10} max={100} value={km} onChange={e=>setKm(+e.target.value)}
        style={{width:'100%',accentColor:C.teal,cursor:'pointer',marginBottom:12}}/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
        {ALL_PINS.slice(0,count).map(p=>(
          <span key={p} style={{background:C.tealL,color:C.tealD,fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20}}>{p}</span>
        ))}
      </div>
      <div style={{fontSize:12,color:C.gray400}}>
        {count} {T[l].pincodes} · {pinInfo.district}, {pinInfo.state}
        <span style={{marginLeft:8,background:C.tealL,color:C.teal,fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10}}>{T[l].liveApi}</span>
      </div>
    </Card>
  );
}

function WAPanel({l}){
  const [msg,setMsg]=useState('');
  const [sent,setSent]=useState(false);
  const tmpls=[
    '🎉 New arrival! Kurta sets in stock.',
    '🛍️ Weekend sale: 15% off Sarees. Code: SAREE15',
    '📦 Flash deal: Kids wear from ₹299',
  ];
  const send=()=>{
    if(!msg.trim())return;
    setSent(true);
    setTimeout(()=>{setSent(false);setMsg('');},2500);
  };
  return (
    <Card>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:C.gray800}}>{T[l].waAlerts}</div>
        <span style={{background:C.green,color:C.white,fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,animation:'pulse 1.6s ease infinite'}}>LIVE</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
        {tmpls.map((t,i)=>(
          <button key={i} onClick={()=>setMsg(t)}
            style={{textAlign:'left',padding:'8px 12px',borderRadius:8,border:`1px solid ${C.gray200}`,
              background:C.gray50,fontSize:12,color:C.gray600,cursor:'pointer',outline:'none'}}>
            {t}
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <input value={msg} onChange={e=>setMsg(e.target.value)} placeholder={T[l].typeMsg}
          style={{flex:1,padding:'8px 12px',borderRadius:8,border:`1.5px solid ${C.gray200}`,fontSize:13,outline:'none',color:C.gray800}}/>
        <button onClick={send}
          style={{padding:'8px 16px',borderRadius:8,border:'none',
            background:sent?C.green:C.teal,color:C.white,fontWeight:700,fontSize:13,
            cursor:'pointer',transition:'background .2s',minWidth:68,outline:'none'}}>
          {sent?'✓':T[l].send}
        </button>
      </div>
    </Card>
  );
}

      .catch(()=>{/* keep fallback */});
    // Pincode API
    fetch('https://api.postalpincode.in/pincode/823001')
      .then(r=>r.json())
      .then(d=>{const po=d[0]?.PostOffice?.[0];if(po)setPinInfo({district:po.District,state:po.State});})
      .catch(()=>{/* keep fallback */});
  },[]);

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <Home pinInfo={pinInfo} l={l}/>;
      case 'orders':    return <Orders l={l}/>;
      case 'payments':  return <Payments l={l}/>;
      case 'analytics': return <Analytics l={l}/>;
      case 'support':   return <Support l={l}/>;
      case 'growth':    return <Growth l={l}/>;
      default:          return <Soon name={T[l][page]||page}/>;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',width:'100vw',overflow:'hidden'}}>
      <Sidebar active={page} setActive={setPage} l={l}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        <TopBar lang={lang} setLang={setLang} wp={wp} setWp={setWp} weather={weather} l={l}/>
        <div className="scroll-area">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
