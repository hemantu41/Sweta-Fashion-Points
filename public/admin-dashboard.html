  return T[l].greeting3;
};
const weatherIcon=(code)=>{
  if(code===0)return'☀️';
  if(code<=2)return'⛅';
  if(code<=45)return'🌫️';
  if(code<=67)return'🌧️';
  if(code<=77)return'🌨️';
  if(code<=82)return'🌦️';
  return'⛈️';
};

/* ── SUPPORT ── */
const Support=({l})=>{
  const [cat,setCat]=useState('');
  const [desc,setDesc]=useState('');
  const [success,setSuccess]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const submit=()=>{
    if(!cat||!desc.trim())return;
    setSubmitting(true);
    setTimeout(()=>{setSubmitting(false);setSuccess(true);setCat('');setDesc('');
      setTimeout(()=>setSuccess(false),3000);},600);
  };
  const cats=[T[l].paymentIssue,T[l].orderIssue,T[l].listingBlocked,T[l].returnDispute,T[l].other];
  return (
    <div style={{padding:'22px 20px'}}>
      <div style={{fontSize:20,fontWeight:800,color:P.gray800,marginBottom:16}}>{T[l].support}</div>
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <Card style={{flex:1,minWidth:260}}>
          <SectionTitle>{T[l].raiseTicket}</SectionTitle>
          <div style={{background:P.amberL,border:`1px solid ${P.amber}44`,borderRadius:10,padding:'10px 14px',fontSize:12,color:P.amber,fontWeight:500,marginBottom:14}}>{T[l].slaNote}</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:600,color:P.gray600,marginBottom:5}}>{T[l].category2}</div>
            <select value={cat} onChange={e=>setCat(e.target.value)} style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1.5px solid ${P.gray200}`,fontSize:13,color:P.gray800,outline:'none',background:P.white,cursor:'pointer'}}>
              <option value="">— Select —</option>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:P.gray600,marginBottom:5}}>{T[l].description}</div>
            <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1.5px solid ${P.gray200}`,fontSize:13,color:P.gray800,outline:'none',resize:'vertical',fontFamily:'DM Sans,sans-serif'}}/>
          </div>
          {success&&<div style={{background:P.tealL,color:P.tealD,borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:600,marginBottom:10}}>{T[l].ticketSuccess}</div>}
          <button onClick={submit} disabled={submitting} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:success?P.teal:P.gray800,color:P.white,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'DM Sans,sans-serif',transition:'background .2s'}}>
            {T[l].submit}
          </button>
        </Card>
        <Card style={{flex:1,minWidth:260}}>
          <SectionTitle>{T[l].myTickets}</SectionTitle>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {tickets.map(t=>(
              <div key={t.id} style={{padding:'12px',borderRadius:10,background:P.gray50,border:`1px solid ${P.gray200}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:700,color:P.gray800}}>{t.id}</span>
                  <Badge status={t.status} l={l}/>
                </div>
                <div style={{fontSize:12,color:P.gray600,marginBottom:4}}>{t.msg}</div>
                <div style={{fontSize:11,color:P.gray400}}>{t.time}</div>

};

/* ── APP ROOT ── */
function App(){
  const [lang,setLang]=useState('en');
  const [active,setActive]=useState('dashboard');
  const [weather,setWeather]=useState({temp:32,icon:'☀️',wind:8});
  const [pinInfo,setPinInfo]=useState({district:'Gaya',state:'Bihar'});
  const [wp,setWp]=useState(true);
  const l=lang;

  useEffect(()=>{
    (async()=>{
      try{
        const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=24.7955&longitude=84.9994&current=temperature_2m,weathercode,windspeed_10m&timezone=Asia/Kolkata');
        const d=await r.json();
        const c=d.current;
        setWeather({temp:Math.round(c.temperature_2m),icon:weatherIcon(c.weathercode),wind:Math.round(c.windspeed_10m)});
      }catch{/* fallback already set */}
    })();
    (async()=>{
      try{
        const r=await fetch('https://api.postalpincode.in/pincode/823001');
        const d=await r.json();
        const po=d[0]?.PostOffice?.[0];
        if(po)setPinInfo({district:po.District,state:po.State});
      }catch{/* fallback already set */}
    })();
  },[]);

  const sections={
    dashboard:<Home lang={lang} pinInfo={pinInfo} l={l}/>,
    orders:<Orders l={l}/>,
    catalogue:<ComingSoon name={T[l].catalogue}/>,
    payments:<Payments l={l}/>,
    analytics:<Analytics l={l}/>,
    support:<Support l={l}/>,
    growth:<Growth l={l}/>,
    settings:<ComingSoon name={T[l].settings}/>,
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar active={active} setActive={setActive} l={l}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar lang={lang} setLang={setLang} wp={wp} setWp={setWp} weather={weather} l={l}/>
        <div style={{flex:1,overflowY:'auto'}}>
          {sections[active]||<ComingSoon name={active}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
