function DeliveryZone({pinInfo, l}) {
  const [km, setKm] = useState(30);
  const count = Math.max(1, Math.ceil((km / 100) * ALL_PINS.length));
  return (
    <Card>
      <STitle>{T[l].delivZone}</STitle>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:13,color:P.gray600}}>{T[l].radius}</span>
        <span style={{fontSize:14,fontWeight:700,color:P.teal}}>{km} km</span>
      </div>
      <input type="range" min={10} max={100} value={km}
        onChange={e => setKm(+e.target.value)}
        style={{width:'100%', accentColor:P.teal, cursor:'pointer', marginBottom:14, height:4}}/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {ALL_PINS.slice(0,count).map(p => (
          <span key={p} style={{
            background:P.tealL, color:P.tealD, fontSize:11, fontWeight:700,
            padding:'3px 11px', borderRadius:20,
          }}>{p}</span>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:P.gray400}}>
        <span>{count} {T[l].pincodes} · {pinInfo.district}, {pinInfo.state}</span>
        <span style={{
          background:P.tealL, color:P.teal, fontSize:10,
          fontWeight:700, padding:'2px 8px', borderRadius:10,
        }}>{T[l].liveApi}</span>
      </div>
    </Card>
  );
}

              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:P.gray800}}>{s.title}</div>
                <div style={{fontSize:11.5,color:P.gray400,margin:'3px 0 8px',lineHeight:1.5}}>{s.desc}</div>
                <button style={{
                  padding:'5px 14px', borderRadius:8, border:'none',
                  background:P.tealL, color:P.tealD, fontWeight:700, fontSize:12,
                }}>{s.cta}</button>
              </div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ─── COMING SOON ───────────────────────────────────────── */
function ComingSoon({name}) {
  return (
    <div style={{
      flex:1, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      padding:60, gap:16, animation:'fadeIn .3s ease',
    }}>
      <span style={{fontSize:56,animation:'fadeUp .4s ease'}}>🚧</span>
      <div style={{fontSize:20,fontWeight:800,color:P.gray800}}>{name}</div>
      <div style={{fontSize:13,color:P.gray400}}>{T['en'].comingSoon}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [lang,   setLang]    = useState('en');
  const [page,   setPage]    = useState('dashboard');
  const [weather,setWeather] = useState({temp:32, icon:'☀️'});
  const [pinInfo,setPinInfo] = useState({district:'Gaya', state:'Bihar'});
  const [wp,     setWp]      = useState(true);
  const l = lang;

  useEffect(() => {
    /* Weather — Open-Meteo */
    fetch('https://api.open-meteo.com/v1/forecast?latitude=24.7955&longitude=84.9994&current=temperature_2m,weathercode,windspeed_10m&timezone=Asia/Kolkata')
      .then(r => r.json())
      .then(d => setWeather({
        temp: Math.round(d.current.temperature_2m),
        icon: wIcon(d.current.weathercode),
      }))
      .catch(() => {/* keep default */});

    /* India Post Pincode */
    fetch('https://api.postalpincode.in/pincode/823001')
      .then(r => r.json())
      .then(d => {
        const po = d[0]?.PostOffice?.[0];
        if (po) setPinInfo({district: po.District, state: po.State});
      })
      .catch(() => {/* keep default */});
  }, []);

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <Dashboard pinInfo={pinInfo} l={l}/>;
      case 'orders':    return <Orders l={l}/>;
      case 'analytics': return <Analytics l={l}/>;
      case 'payments':  return <Payments l={l}/>;
      case 'support':   return <Support l={l}/>;
      case 'growth':    return <Growth l={l}/>;
      default:          return <ComingSoon name={T[l][page] || page}/>;
    }
  };

  return (
    <div style={{display:'flex', height:'100vh', width:'100vw', overflow:'hidden'}}>
      <Sidebar active={page} setActive={setPage} l={l}/>
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0}}>
        <TopBar lang={lang} setLang={setLang} wp={wp} setWp={setWp} weather={weather} l={l}/>
        <div className="main-scroll">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
